name: Release

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js (for npm publish)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Build oxlint plugin
        run: bun run build
        working-directory: oxlint/eslint-plugin-workhorse

      - name: Build core
        run: bun run build
        working-directory: packages/core

      - name: Build plugins
        run: bun run build:plugins

      - name: Build TUI
        run: bun run build:tui

      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: bun changeset version
          publish: bun changeset publish
          title: "chore: version packages"
          commit: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Upload TUI binary to GitHub Release
        if: steps.changesets.outputs.published == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const publishedPackages = JSON.parse('${{ steps.changesets.outputs.publishedPackages }}');
            const tuiPkg = publishedPackages.find(p => p.name === 'workhorse');
            if (!tuiPkg) { console.log('TUI not published this run, skipping.'); return; }

            const tagName = `workhorse@${tuiPkg.version}`;

            const { data: release } = await github.rest.repos.getReleaseByTag({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag: tagName,
            });

            await github.rest.repos.uploadReleaseAsset({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.id,
              name: 'workhorse.js',
              data: fs.readFileSync('packages/tui/dist/workhorse.js'),
            });

            const installInstructions = [
              `## Install`,
              ``,
              `\`\`\`sh`,
              `# With bun`,
              `bun install -g workhorse`,
              `\`\`\``,
              ``,
              `Or download \`workhorse.js\` from the assets below and place it in your PATH:`,
              `\`\`\`sh`,
              `chmod +x workhorse.js && mv workhorse.js $(bun pm bin -g)/workhorse`,
              `\`\`\``,
            ].join('\n');

            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.id,
              body: `${release.body ?? ''}\n\n${installInstructions}`,
            });

