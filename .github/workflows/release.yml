name: Release

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js (for npm publish)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Build oxlint plugin
        run: bun run build
        working-directory: oxlint/eslint-plugin-workhorse

      - name: Build core
        run: bun run build
        working-directory: packages/core

      - name: Build plugins
        run: bun run build:plugins

      - name: Build TUI
        run: bun run build:tui:prod

      - name: Release
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          bunx changelogen --release --push
          bunx changelogen gh release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish TUI to npm
        run: npm publish --access public --provenance
        working-directory: packages/tui
