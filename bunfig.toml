# Bun configuration for Jiratown

# Preload the OpenTUI Solid plugin for JSX transformation
preload = ["@opentui/solid/preload"]

[test]
# Preload OpenTUI Solid plugin for JSX in tests
preload = ["@opentui/solid/preload"]

# Run tests sequentially to avoid database and mocking conflicts
parallel = false

# Enable coverage by default
coverage = true

# Coverage threshold - fail if line coverage drops below 97%
coverageThreshold = { line = 0.97 }
