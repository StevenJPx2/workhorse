# A workflow = a list of STAGES. Work flows down the stages and can loop
# in place or jump back. The only routing decision is "which stage are we in".
#
#   planning ──▶ implementing ──▶ ready_for_review ──▶ in_review ──▶ done
#      ▲loop          ▲loop              │                  │
#      └──────────────┴──── back ◀───────┴──── back ◀───────┘

name = "ralph"
version = "1"

# ───────── stages ─────────
# Each stage runs its steps in order, looping, until a rule moves us on.
# A rule reads as: when <something is true>, to <another stage>. First match wins.

[[states]]
name = "planning"
steps = ["prompt-engineer", "planner"]
exits = [{ when = "todos_complete", to = "implementing" }]

[[states]]
name = "implementing"
steps = ["coder", "memory-weaver"]                             # loops coder → memory → coder …
exits = [{ when = "todos_complete", to = "ready_for_review" }]

[[states]]
name = "ready_for_review"
steps = ["verifier"]
exits = [
  { when = 'checks_status == "passed"', to = "in_review" },    # checks pass → review
  { when = 'checks_status != "passed"', to = "implementing" }, # checks fail → back to coding
]

[[states]]
name = "in_review"
steps = ["reviewer"]
exits = [
  { when = "open_review_threads > 0", to = "implementing" },
] # changes requested → back
# No other rule, so this stage just waits ("parks") until an external
# sign-off / merge forces `done`.

# ───────── steps ─────────
# Each step is mostly a preset (see ../presets/). Add fields here only to
# override the preset for THIS workflow.

[steps.prompt-engineer]
preset = "prompt"

[steps.planner]
preset = "planning"

[steps.coder]
preset = "coding"
token_budget = 150_000 # this workflow gives the coder a bigger budget

[[steps.coder.sub_agents]] # a read-only helper the coder can spawn
name = "researcher"
model = "claude-haiku-3"
write_globs = []
tools = ["fs_read", "fs_grep", "fs_glob"]

[steps.memory-weaver]
preset = "memory"
model = "claude-haiku-3" # lighter model for summarising

[steps.verifier]
preset = "verify"

[steps.reviewer]
preset = "review-monitor"
