<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>core-v2 · smoke runner</title>
    <style>
      :root {
        --bg: #0d1117;
        --panel: #161b22;
        --border: #30363d;
        --text: #c9d1d9;
        --muted: #8b949e;
        --accent: #58a6ff;
        --ok: #3fb950;
        --fail: #f85149;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font:
          14px/1.5 ui-monospace,
          SFMono-Regular,
          Menlo,
          Consolas,
          monospace;
      }
      header {
        padding: 16px 20px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: baseline;
        gap: 12px;
      }
      header h1 {
        font-size: 16px;
        margin: 0;
      }
      header span {
        color: var(--muted);
      }
      main {
        display: grid;
        grid-template-columns: 280px 1fr;
        gap: 16px;
        padding: 16px 20px;
        height: calc(100vh - 57px);
      }
      .controls {
        display: flex;
        flex-direction: column;
        gap: 10px;
        overflow-y: auto;
      }
      .smoke {
        border: 1px solid var(--border);
        background: var(--panel);
        border-radius: 8px;
        padding: 12px;
      }
      .smoke b {
        color: var(--accent);
      }
      .smoke p {
        margin: 6px 0 10px;
        color: var(--muted);
        font-size: 12px;
      }
      button {
        font: inherit;
        cursor: pointer;
        border: 1px solid var(--border);
        background: #21262d;
        color: var(--text);
        border-radius: 6px;
        padding: 6px 12px;
      }
      button:hover:not(:disabled) {
        border-color: var(--accent);
      }
      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .row {
        display: flex;
        gap: 8px;
      }
      .run-all {
        background: var(--accent);
        color: #0d1117;
        border-color: var(--accent);
        font-weight: 600;
      }
      .term-wrap {
        display: flex;
        flex-direction: column;
        min-height: 0;
      }
      .statusbar {
        display: flex;
        align-items: center;
        gap: 10px;
        padding-bottom: 8px;
      }
      .dot {
        width: 9px;
        height: 9px;
        border-radius: 50%;
        background: var(--muted);
      }
      .dot.running {
        background: var(--accent);
        animation: pulse 1s infinite;
      }
      .dot.ok {
        background: var(--ok);
      }
      .dot.fail {
        background: var(--fail);
      }
      @keyframes pulse {
        50% {
          opacity: 0.3;
        }
      }
      #term {
        flex: 1;
        margin: 0;
        padding: 14px;
        background: #010409;
        border: 1px solid var(--border);
        border-radius: 8px;
        overflow: auto;
        white-space: pre-wrap;
        word-break: break-word;
      }
      .a-cyan {
        color: #56d4dd;
      }
      .a-green {
        color: var(--ok);
      }
      .a-red {
        color: var(--fail);
      }
      .a-yellow {
        color: #d29922;
      }
      .a-dim {
        color: var(--muted);
      }
      .a-bold {
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>core-v2 smoke runner</h1>
      <span>spawns each smoke script and streams its output</span>
    </header>
    <main>
      <div class="controls" id="controls">
        <button class="run-all" id="run-all">▶ Run all</button>
        <button id="clear">Clear output</button>
      </div>
      <div class="term-wrap">
        <div class="statusbar">
          <span class="dot" id="dot"></span>
          <span id="status">idle</span>
        </div>
        <pre id="term"></pre>
      </div>
    </main>

    <script>
      const SMOKES = /*__SMOKES__*/;
      const term = document.getElementById("term");
      const dot = document.getElementById("dot");
      const status = document.getElementById("status");
      const controls = document.getElementById("controls");
      const runAllBtn = document.getElementById("run-all");

      // Minimal ANSI SGR → span converter (covers what yoctocolors emits).
      const ANSI = {
        1: "a-bold",
        2: "a-dim",
        31: "a-red",
        32: "a-green",
        33: "a-yellow",
        36: "a-cyan",
      };

      function escapeHtml(s) {
        return s.replace(/[&<>]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" })[c]);
      }

      function ansiToHtml(text) {
        let out = "";
        let open = 0;
        const parts = text.split(/\u001b\[([0-9;]*)m/);
        for (let i = 0; i < parts.length; i++) {
          if (i % 2 === 0) {
            out += escapeHtml(parts[i]);
          } else {
            for (const code of parts[i].split(";")) {
              const n = Number(code);
              if (n === 0) {
                while (open-- > 0) out += "</span>";
                open = 0;
              } else if (ANSI[n]) {
                out += `<span class="${ANSI[n]}">`;
                open++;
              }
            }
          }
        }
        while (open-- > 0) out += "</span>";
        return out;
      }

      function append(text) {
        term.insertAdjacentHTML("beforeend", ansiToHtml(text));
        term.scrollTop = term.scrollHeight;
      }

      function setStatus(state, message) {
        dot.className = "dot" + (state ? " " + state : "");
        status.textContent = message;
      }

      function setDisabled(value) {
        for (const btn of controls.querySelectorAll("button")) btn.disabled = value;
      }

      function runOne(name) {
        return new Promise((resolve) => {
          const smoke = SMOKES[name];
          append(`\n\u001b[1m\u001b[36m== ${smoke.label} (${smoke.file}) ==\u001b[0m\n`);
          setStatus("running", `running ${smoke.label}…`);

          const es = new EventSource(`/run/${name}`);
          es.addEventListener("out", (e) => append(e.data + "\n"));
          es.addEventListener("done", (e) => {
            const code = Number(e.data);
            es.close();
            if (code === 0) {
              setStatus("ok", `${smoke.label} ✓ (exit 0)`);
            } else {
              append(`\n\u001b[31m[exit ${code}]\u001b[0m\n`);
              setStatus("fail", `${smoke.label} ✗ (exit ${code})`);
            }
            resolve(code);
          });
          es.onerror = () => {
            es.close();
            append("\n\u001b[31m[connection error]\u001b[0m\n");
            setStatus("fail", "connection error");
            resolve(1);
          };
        });
      }

      async function run(names) {
        setDisabled(true);
        let failures = 0;
        for (const name of names) {
          const code = await runOne(name);
          if (code !== 0) failures++;
        }
        setDisabled(false);
        const total = names.length;
        setStatus(
          failures ? "fail" : "ok",
          `done — ${total - failures}/${total} passed`,
        );
      }

      // Build a card + button per smoke.
      for (const [name, smoke] of Object.entries(SMOKES)) {
        const card = document.createElement("div");
        card.className = "smoke";
        card.innerHTML = `<b>${smoke.label}</b><p>${smoke.blurb}</p>`;
        const btn = document.createElement("button");
        btn.textContent = `Run ${smoke.label}`;
        btn.onclick = () => run([name]);
        card.appendChild(btn);
        controls.appendChild(card);
      }

      runAllBtn.onclick = () => run(Object.keys(SMOKES));
      document.getElementById("clear").onclick = () => {
        term.textContent = "";
        setStatus("", "idle");
      };
    </script>
  </body>
</html>
